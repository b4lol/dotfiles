# Distrobox Manifest
# Generates and configures Fedora Developer Station and Kali Linux containers

[fedora]
image=ghcr.io/ublue-os/fedora-toolbox:latest
init=false
nvidia=false
pull=true
replace=false
additional_packages="gcc gcc-c++ clang llvm cmake ninja-build gdb valgrind python3-pip python3-devel nodejs npm golang git gh jq ripgrep fd-find fzf bat eza htop btop tmux tree unzip zip lsof strace httpie"
init_hooks="curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"

[kali]
image=docker.io/kalilinux/kali-rolling:latest
init=false
nvidia=false
pull=true
replace=false
additional_packages="kali-tools-top10 kali-linux-headless nmap sqlmap gobuster ffuf hydra john socat tcpdump nikto python3-pip wordlists curl wget git"
init_hooks="echo '#!/bin/sh' > /var/lib/dpkg/info/systemd.postinst && echo 'exit 0' >> /var/lib/dpkg/info/systemd.postinst && chmod +x /var/lib/dpkg/info/systemd.postinst && echo '#!/bin/sh' > /var/lib/dpkg/info/udev.postinst && echo 'exit 0' >> /var/lib/dpkg/info/udev.postinst && chmod +x /var/lib/dpkg/info/udev.postinst"
